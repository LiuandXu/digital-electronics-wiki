site_name: 数字电子技术 Wiki
site_url: https://liuandxu.github.io/digital-electronics-wiki/
repo_url: https://github.com/LiuandXu/digital-electronics-wiki
repo_name: LiuandXu/digital-electronics-wiki

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

nav:
  - 首页: index.md
  - 数制与逻辑代数:
    - 概述: ch01/index.md
  - 逻辑门电路:
    - 概述: ch02/index.md
  - 组合逻辑电路:
    - 概述: ch03/index.md
  - 触发器:
    - 概述: ch04/index.md
  - 时序逻辑电路:
    - 概述: ch05/index.md
  - 脉冲电路:
    - 概述: ch06/index.md
  - 半导体存储器:
    - 概述: ch07/index.md
  - 数模与模数转换:
    - 概述: ch08/index.md
